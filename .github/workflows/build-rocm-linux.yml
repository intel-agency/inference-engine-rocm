name: Build ROCm Native & Pack

on:
  workflow_dispatch:
  push:
    branches: [development, staging, release]
    paths:
      - "scripts/compile_onnx_rocm_docker.sh"
      - "InferenceEngine.Core/**"
      - ".github/workflows/build-rocm-linux.yml"

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-rocm:
    name: Build ROCm Native Libs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force

      - name: Set script permissions
        run: chmod +x scripts/compile_onnx_rocm_docker.sh

      - name: Compile Native ROCm Libs (Docker)
        run: |
          mkdir -p artifacts
          # Pin to ROCm 6.0.2 — ORT v1.19.2 cmake is incompatible with ROCm 7.x
          docker run --rm \
            -v ${{ github.workspace }}:/code \
            -w /code \
            rocm/dev-ubuntu-22.04:6.0.2 \
            /code/scripts/compile_onnx_rocm_docker.sh

      - name: Upload Native Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-rocm-libs
          path: artifacts/*.so
          retention-days: 5

  pack-nuget:
    name: Pack NuGet with ROCm
    needs: build-rocm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Native Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: native-rocm-libs
          path: temp_artifacts

      - name: Inject Native Assets
        run: |
          echo "Injecting ROCm libraries into package structure..."
          TARGET_DIR="InferenceEngine.Core/runtimes/linux-x64/native"
          mkdir -p "$TARGET_DIR"
          cp temp_artifacts/libonnxruntime.so "$TARGET_DIR/"
          cp temp_artifacts/libonnxruntime_providers_rocm.so "$TARGET_DIR/"
          ls -lh "$TARGET_DIR"

      - name: Compute Package Version
        run: |
          PREFIX="${{ vars.VERSION_PREFIX }}"
          RUN="${{ github.run_number }}"
          case "${{ github.ref_name }}" in
            development) VERSION="${PREFIX}-dev.${RUN}" ;;
            staging)     VERSION="${PREFIX}-rc.${RUN}" ;;
            release)     VERSION="${PREFIX}.${RUN}" ;;
            *)           VERSION="${PREFIX}-local.${RUN}" ;;
          esac
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Computed version: $VERSION"

      - name: Pack NuGet Package
        run: |
          echo "Packing version: ${{ env.VERSION }}"
          dotnet pack InferenceEngine.Core/InferenceEngine.ROCm.Runtime.linux-x64.csproj \
            --configuration Release \
            --output ./nupkg \
            -p:Version=${{ env.VERSION }}

      - name: Upload NuGet Package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget-package-rocm
          path: ./nupkg/*.nupkg
          retention-days: 30

  validate-native:
    name: Validate Native Libs
    needs: pack-nuget
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Native Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: native-rocm-libs
          path: native-libs

      - name: Build test project
        run: |
          dotnet build InferenceEngine.Core.IntegrationTests/InferenceEngine.Core.IntegrationTests.csproj \
            --configuration Release \
            --runtime linux-x64

      - name: Inject ROCm native libs into test output
        run: |
          OUTPUT_DIR="InferenceEngine.Core.IntegrationTests/bin/Release/net10.0/linux-x64"
          # ORT 1.24.x uses [DllImport("onnxruntime.dll")] on all platforms.
          # On Linux, .NET probes the app output dir first, where NuGet has placed the
          # Windows PE onnxruntime.dll. Override it with our ROCm ELF so the load succeeds.
          cp native-libs/libonnxruntime.so "$OUTPUT_DIR/onnxruntime.dll"
          cp native-libs/libonnxruntime.so "$OUTPUT_DIR/libonnxruntime.so"
          cp native-libs/libonnxruntime_providers_rocm.so "$OUTPUT_DIR/"
          echo "Native libs injected:"
          ls -lh "$OUTPUT_DIR/"*onnx* "$OUTPUT_DIR/"*rocm* 2>/dev/null || true

      - name: Run Tier-1 validation tests
        env:
          NATIVE_LIBS_DIR: ${{ github.workspace }}/native-libs
        run: |
          dotnet test InferenceEngine.Core.IntegrationTests/InferenceEngine.Core.IntegrationTests.csproj \
            --configuration Release \
            --runtime linux-x64 \
            --no-build \
            --logger "console;verbosity=normal"

  publish-github-packages:
    name: Publish to GitHub Packages
    needs: validate-native
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download NuGet Package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nuget-package-rocm
          path: ./nupkg

      - name: Publish to GitHub Packages
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --source "https://nuget.pkg.github.com/intel-agency/index.json" \
            --api-key ${{ secrets.GITHUB_TOKEN }} \
            --skip-duplicate

  create-release:
    name: Create GitHub Release & Publish to NuGet.org
    needs: validate-native
    if: github.ref_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download NuGet Package
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: nuget-package-rocm
          path: ./nupkg

      - name: Download Native Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: native-rocm-libs
          path: ./native-libs

      - name: Compute Release Version
        run: |
          PREFIX="${{ vars.VERSION_PREFIX }}"
          RUN="${{ github.run_number }}"
          VERSION="${PREFIX}.${RUN}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Generate checksums
        run: |
          cd native-libs
          sha256sum *.so > SHA256SUMS.txt
          cd ../nupkg
          sha256sum *.nupkg >> ../native-libs/SHA256SUMS.txt
          echo "=== SHA256SUMS ==="
          cat ../native-libs/SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@da05d552573ad5aba039eaac05058a918a7bf631 # v2.2.2
        with:
          tag_name: v${{ env.VERSION }}
          name: "v${{ env.VERSION }}"
          generate_release_notes: true
          files: |
            native-libs/*.so
            native-libs/SHA256SUMS.txt
            nupkg/*.nupkg

      - name: Publish to NuGet.org
        run: |
          dotnet nuget push "./nupkg/*.nupkg" \
            --source "https://api.nuget.org/v3/index.json" \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --skip-duplicate
