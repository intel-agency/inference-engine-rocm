name: Build Linux ROCm & Pack

on:
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [ "master", "main", "release" ]
    paths:
      - "scripts/compile_onnx_rocm_docker.sh"
      - ".github/workflows/build-rocm-linux.yml"

env:
  DOTNET_VERSION: "10.0.x"

jobs:
  build-rocm:
    name: Build ROCm Native Libs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Free Disk Space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc
          sudo rm -rf "/usr/local/share/boost"
          sudo rm -rf "$AGENT_TOOLSDIRECTORY"
          sudo docker image prune --all --force

      - name: Set script permissions
        run: chmod +x scripts/compile_onnx_rocm_docker.sh

      - name: Compile Native ROCm Libs (Docker)
        run: |
          mkdir -p artifacts
          # Using 22.04 base image which has broader compatibility than 24.04 for ROCm currently
          docker run --rm \
            -v ${{ github.workspace }}:/code \
            -w /code \
            rocm/dev-ubuntu-22.04:latest \
            /code/scripts/compile_onnx_rocm_docker.sh

      - name: Upload Native Artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: native-rocm-libs
          path: artifacts/*.so
          retention-days: 1

  pack-nuget:
    name: Pack NuGet with ROCm
    needs: build-rocm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Setup .NET
        uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download Native Artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: native-rocm-libs
          path: temp_artifacts

      - name: Inject Native Assets
        run: |
          echo "Injecting ROCm libraries into InferenceEngine.Core project structure..."

          # Standard RID-based structure for native assets
          TARGET_DIR="InferenceEngine.Core/runtimes/linux-x64/native"
          mkdir -p "$TARGET_DIR"

          cp temp_artifacts/libonnxruntime.so "$TARGET_DIR/"
          cp temp_artifacts/libonnxruntime_providers_rocm.so "$TARGET_DIR/"

          ls -R InferenceEngine.Core/runtimes

      - name: Pack NuGet Package
        run: |
          # Append -rocm suffix and run number to distinguish this build
          VERSION="1.0.0-rocm.${{ github.run_number }}"
          echo "Building version: $VERSION"

          dotnet restore InferenceEngine.Core/InferenceEngine.Core.csproj

          # Build
          dotnet build InferenceEngine.Core/InferenceEngine.Core.csproj -c Release --no-restore

          # Pack
          dotnet pack InferenceEngine.Core/InferenceEngine.Core.csproj \
            --configuration Release \
            --no-build \
            --output ./nupkg \
            -p:Version=$VERSION

      - name: Upload NuGet Package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: nuget-package-rocm
          path: ./nupkg/*.nupkg
          retention-days: 7
